events {
  worker_connections 1024;
}

http {
  server {
    listen 80;

    location / {
      proxy_pass http://192.168.1.106:8002;

      # ── THE FIX: strip Valhalla's own CORS header before nginx adds one ──
      # Without this, you get '*, *' which browsers reject
      proxy_hide_header 'Access-Control-Allow-Origin';
      proxy_hide_header 'Access-Control-Allow-Methods';
      proxy_hide_header 'Access-Control-Allow-Headers';

      # ── Timeouts (Valhalla can be slow on first route) ───────────────────
      proxy_connect_timeout 30s;
      proxy_send_timeout    120s;
      proxy_read_timeout    120s;

      # ── Forward real client IP ────────────────────────────────────────────
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

      # ── Single clean CORS header ──────────────────────────────────────────
      add_header 'Access-Control-Allow-Origin'  '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

      # ── Handle OPTIONS preflight without hitting Valhalla ─────────────────
      if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'  '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
        add_header 'Access-Control-Max-Age'       '86400';
        add_header 'Content-Length'               '0';
        return 204;
      }
    }
  }
}