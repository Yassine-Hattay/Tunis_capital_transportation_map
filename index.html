<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="description" content="Offline-first open map with GPS tracking and routing" />
  <title>Atlas — Offline Maps</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- MapLibre GL JS (loaded from CDN, cached by SW on first visit) -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <!-- PMTiles library - lowercase global variable -->
  <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>

  <style>
    :root {
      --c-bg: #0f1117;
      --c-surface: #191c24;
      --c-border: rgba(255, 255, 255, 0.08);
      --c-accent: #4ade80;
      --c-accent2: #818cf8;
      --c-text: #e8eaf0;
      --c-muted: #6b7280;
      --c-danger: #f87171;
      --c-warn: #fbbf24;
      --r: 10px;
      --panel-w: 320px;
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── Map Container ─────────────────────── */
    #map {
      flex: 1;
      width: 100%;
      position: relative;
    }

    /* ─── Top Bar ───────────────────────────── */
    #topbar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #search-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r);
      padding: 0 14px;
      height: 44px;
      gap: 10px;
      backdrop-filter: blur(12px);
      transition: border-color 0.2s;
    }

    #search-box:focus-within {
      border-color: var(--c-accent);
    }

    #search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--c-text);
      font-size: 14px;
      font-family: inherit;
    }

    #search-input::placeholder {
      color: var(--c-muted);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--r);
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .icon-btn:hover {
      border-color: var(--c-accent);
      color: var(--c-accent);
    }

    .icon-btn.active {
      background: var(--c-accent);
      color: #0f1117;
      border-color: var(--c-accent);
    }

    /* ─── Status Bar ────────────────────────── */
    #statusbar {
      position: absolute;
      bottom: 20px;
      left: 12px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 24px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--c-muted);
      backdrop-filter: blur(12px);
      transition: all 0.3s;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--c-muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.online {
      background: var(--c-accent);
      box-shadow: 0 0 6px var(--c-accent);
    }

    .status-dot.gps-active {
      background: var(--c-accent2);
      box-shadow: 0 0 6px var(--c-accent2);
      animation: pulse 2s infinite;
    }

    .status-dot.offline {
      background: var(--c-warn);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ─── Info Panel (slide-in) ─────────────── */
    #panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--c-surface);
      border-top: 1px solid var(--c-border);
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 32px;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 70dvh;
      overflow-y: auto;
    }

    #panel.open {
      transform: translateY(0);
    }

    .panel-handle {
      width: 36px;
      height: 4px;
      background: var(--c-border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .panel-sub {
      font-size: 13px;
      color: var(--c-muted);
      margin-bottom: 20px;
    }

    /* ─── Route Card ────────────────────────── */
    .route-card {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--r);
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .route-card:hover {
      border-color: var(--c-accent);
    }

    .route-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .route-info {
      flex: 1;
    }

    .route-label {
      font-size: 14px;
      font-weight: 500;
    }

    .route-meta {
      font-size: 12px;
      color: var(--c-muted);
    }

    /* ─── Routing Panel ─────────────────────── */
    #routing-panel {
      position: absolute;
      top: 68px;
      left: 12px;
      width: var(--panel-w);
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r);
      padding: 16px;
      z-index: 100;
      backdrop-filter: blur(12px);
      display: none;
    }

    #routing-panel.open {
      display: block;
    }

    .route-input {
      width: 100%;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--c-text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }

    .route-input:focus {
      border-color: var(--c-accent);
    }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--c-accent);
      border: none;
      border-radius: 8px;
      color: #0f1117;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn-primary:hover {
      opacity: 0.85;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--c-muted);
      margin-bottom: 8px;
    }

    /* ─── Tooltip ────────────────────────────── */
    .maplibregl-popup-content {
      background: var(--c-surface) !important;
      border: 1px solid var(--c-border) !important;
      border-radius: 8px !important;
      color: var(--c-text) !important;
      font-family: inherit !important;
      font-size: 13px !important;
      padding: 10px 14px !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4) !important;
    }

    .maplibregl-popup-tip {
      display: none !important;
    }

    /* ─── Map Controls Override ─────────────── */
    .maplibregl-ctrl-group {
      background: var(--c-surface) !important;
      border: 1px solid var(--c-border) !important;
      border-radius: var(--r) !important;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .maplibregl-ctrl-group button {
      background: none !important;
      border-color: var(--c-border) !important;
      width: 36px !important;
      height: 36px !important;
    }

    .maplibregl-ctrl-group button span {
      filter: invert(1) !important;
    }

    .maplibregl-ctrl-attrib {
      display: none !important;
    }

    .maplibregl-ctrl-bottom-right {
      bottom: 24px;
      right: 12px;
    }

    /* ─── GPS Marker ────────────────────────── */
    .gps-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--c-accent2);
      border: 3px solid white;
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.3);
      animation: gpsPulse 2s infinite;
    }

    @keyframes gpsPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(129, 140, 248, 0.5);
      }

      70% {
        box-shadow: 0 0 0 12px rgba(129, 140, 248, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(129, 140, 248, 0);
      }
    }

    /* ─── Layer switcher ────────────────────── */
    #layers-menu {
      position: absolute;
      top: 68px;
      right: 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r);
      overflow: hidden;
      z-index: 100;
      display: none;
      backdrop-filter: blur(12px);
    }

    #layers-menu.open {
      display: block;
    }

    .layer-option {
      padding: 12px 16px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
      border-bottom: 1px solid var(--c-border);
      color: var(--c-text);
    }

    .layer-option:last-child {
      border-bottom: none;
    }

    .layer-option:hover {
      background: var(--c-bg);
    }

    .layer-option.active {
      color: var(--c-accent);
    }

    /* ─── Offline Notice ─────────────────────── */
    #offline-notice {
      position: absolute;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--c-surface);
      border: 1px solid var(--c-warn);
      border-radius: 24px;
      padding: 8px 18px;
      font-size: 12px;
      color: var(--c-warn);
      z-index: 200;
      display: none;
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }

    #offline-notice.show {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── Coord display ─────────────────────── */
    #coords-display {
      position: absolute;
      bottom: 20px;
      right: 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--c-muted);
      font-variant-numeric: tabular-nums;
      z-index: 100;
      backdrop-filter: blur(12px);
      font-family: 'DM Mono', monospace;
    }

    @media (max-width: 480px) {
      :root {
        --panel-w: calc(100vw - 24px);
      }

      #routing-panel {
        width: var(--panel-w);
      }
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <!-- Top bar -->
  <div id="topbar">
    <div id="search-box">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" opacity="0.5">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input id="search-input" type="text" placeholder="Search places…" autocomplete="off" />
      <span id="search-clear" style="cursor:pointer;opacity:0.5;display:none" onclick="clearSearch()">✕</span>
    </div>
    <button class="icon-btn" id="btn-gps" title="My location" onclick="toggleGPS()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3" />
        <path d="M12 2v3m0 14v3M2 12h3m14 0h3" />
      </svg>
    </button>
    <button class="icon-btn" id="btn-route" title="Route" onclick="toggleRoutingPanel()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 17l4-10 4 6 4-4 6 4" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
    <button class="icon-btn" id="btn-layers" title="Map layers" onclick="toggleLayers()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12 2 22 8.5 12 15 2 8.5" />
        <polyline points="2 15.5 12 22 22 15.5" />
        <polyline points="2 12 12 18.5 22 12" />
      </svg>
    </button>
  </div>

  <!-- Offline notice -->
  <div id="offline-notice">
    <span>⚠</span> Offline mode — using cached Tunisia map
  </div>

  <!-- Routing panel -->
  <div id="routing-panel">
    <p class="section-label">Route</p>
    <input class="route-input" id="from-input" placeholder="From (lat,lng or click map)" type="text" />
    <input class="route-input" id="to-input" placeholder="To (lat,lng or click map)" type="text" />
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="btn-primary" style="background:var(--c-accent)" onclick="planRoute('walk')">🚶 Walk</button>
      <button class="btn-primary" style="background:var(--c-accent2);color:#fff" onclick="planRoute('bike')">🚲
        Bike</button>
      <button class="btn-primary" style="background:#374151;color:#e8eaf0" onclick="planRoute('car')">🚗 Drive</button>
    </div>
    <div id="route-result" style="font-size:13px;color:var(--c-muted);min-height:20px"></div>
  </div>

  <!-- Layer switcher -->
  <div id="layers-menu">
    <div class="layer-option active" id="layer-streets" onclick="setStyle('streets')">
      <span>🗺️</span> Streets
    </div>
    <div class="layer-option" id="layer-dark" onclick="setStyle('dark')">
      <span>🌑</span> Dark
    </div>
    <div class="layer-option" style="opacity:0.5;cursor:not-allowed" title="Requires online API key">
      <span>🛰️</span> Satellite (online only)
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <div class="status-pill" id="network-status">
      <div class="status-dot" id="net-dot"></div>
      <span id="net-label">Checking…</span>
    </div>
    <div class="status-pill" id="gps-status" style="display:none">
      <div class="status-dot gps-active" id="gps-dot"></div>
      <span id="gps-label">GPS active</span>
    </div>
    <div class="status-pill" id="tile-status">
      <div class="status-dot" style="background:var(--c-accent2)"></div>
      <span>Tunisia offline map</span>
    </div>
  </div>

  <!-- Coord display -->
  <div id="coords-display">0.000000, 0.000000</div>

  <!-- Bottom panel -->
  <div id="panel">
    <div class="panel-handle"></div>
    <div class="panel-title" id="panel-title">Location</div>
    <div class="panel-sub" id="panel-sub">0.000, 0.000</div>
    <div id="panel-content"></div>
  </div>

  <script>
    // ─── PMTiles protocol registration (FIXED: lowercase pmtiles) ───────────
    if (typeof pmtiles !== 'undefined' && pmtiles.Protocol) {
      const protocol = new pmtiles.Protocol();
      maplibregl.addProtocol('pmtiles', protocol.tile);
      console.log('[Atlas] PMTiles protocol registered');
    } else {
      console.warn('[Atlas] PMTiles library not loaded — map may not render');
    }

    // ─── Local PMTiles source for Tunisia (offline-first) ───────────────────
    const LOCAL_PMTILES = 'pmtiles:///data/tunis.pmtiles';

    // Map style pointing to local PMTiles — embedded style used if available
    const MAP_STYLE = {
      version: 8,
      glyphs: 'https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf',
      sources: {
        protomaps: {
          type: 'vector',
          tiles: [LOCAL_PMTILES],
          attribution: '© OpenStreetMap contributors'
        }
      },
      layers: [] // Empty = use embedded style from PMTiles metadata
    };
    // Disable online-only styles for offline consistency
    const MAP_STYLE_DARK = MAP_STYLE;
    const MAP_STYLE_POSITRON = MAP_STYLE;

    // ─── Init map ──────────────────────────────────────────────────────────
    const map = new maplibregl.Map({
      container: 'map',
      style: MAP_STYLE,
      center: [10.1815, 36.8065], // Tunis default
      zoom: 12,
      attributionControl: false
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'bottom-right');
    map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

    // Fallback: load embedded style from PMTiles if available
    if (typeof pmtiles !== 'undefined') {
      const protocol = new pmtiles.Protocol();
      protocol.load(LOCAL_PMTILES).then(header => {
        if (header?.json?.layers && header.json.layers.length > 0) {
          // PMTiles has embedded style, apply it
          map.setStyle({
            version: 8,
            glyphs: 'https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf',
            sources: { protomaps: { type: 'vector', tiles: [LOCAL_PMTILES] } },
            layers: header.json.layers
          });
          console.log('[Atlas] Applied embedded PMTiles style');
        } else {
          console.warn('[Atlas] PMTiles has no embedded style — using minimal fallback');
          // Minimal fallback style to at least show background
          map.setStyle({
            version: 8,
            sources: {
              protomaps: { type: 'vector', tiles: [LOCAL_PMTILES] }
            },
            layers: [{
              id: 'background',
              type: 'background',
              paint: { 'background-color': '#1a1a2e' }
            }]
          });
        }
      }).catch(err => {
        console.error('[Atlas] Failed to load PMTiles:', err);
      });
    }

    // Update coords on move
    map.on('mousemove', (e) => {
      document.getElementById('coords-display').textContent =
        `${e.lngLat.lat.toFixed(6)}, ${e.lngLat.lng.toFixed(6)}`;
    });

    // Click to show panel
    map.on('click', (e) => {
      if (routingMode) { handleRoutingClick(e.lngLat); return; }
      const coords = e.lngLat;
      showPanel(
        `${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)}`,
        'Tapped location',
        `
      <div class="route-card" onclick="setRouteDest(${coords.lat}, ${coords.lng})">
        <div class="route-icon" style="background:rgba(74,222,128,0.15)">📍</div>
        <div class="route-info">
          <div class="route-label">Route here</div>
          <div class="route-meta">Set as destination</div>
        </div>
      </div>
      <div class="route-card" onclick="copyCoords(${coords.lat}, ${coords.lng})">
        <div class="route-icon" style="background:rgba(129,140,248,0.15)">📋</div>
        <div class="route-info">
          <div class="route-label">Copy coordinates</div>
          <div class="route-meta">${coords.lat.toFixed(6)}, ${coords.lng.toFixed(6)}</div>
        </div>
      </div>
    `
      );
      new maplibregl.Marker({ color: '#4ade80', scale: 0.7 })
        .setLngLat([coords.lng, coords.lat])
        .addTo(map);
    });

    // ─── GPS Tracking ──────────────────────────────────────────────────────
    let gpsWatcher = null;
    let gpsMarker = null;
    let gpsActive = false;

    function toggleGPS() {
      if (gpsActive) {
        stopGPS();
      } else {
        startGPS();
      }
    }

    function startGPS() {
      if (!navigator.geolocation) {
        alert('Geolocation not supported by this browser.');
        return;
      }
      document.getElementById('btn-gps').classList.add('active');
      document.getElementById('gps-status').style.display = 'flex';
      gpsActive = true;

      gpsWatcher = navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude: lat, longitude: lng, accuracy } = pos.coords;
          document.getElementById('gps-label').textContent =
            `±${Math.round(accuracy)}m`;

          if (!gpsMarker) {
            const el = document.createElement('div');
            el.className = 'gps-marker';
            gpsMarker = new maplibregl.Marker({ element: el })
              .setLngLat([lng, lat])
              .addTo(map);
            map.flyTo({ center: [lng, lat], zoom: 15, duration: 1200 });
          } else {
            gpsMarker.setLngLat([lng, lat]);
          }
        },
        (err) => {
          document.getElementById('gps-label').textContent = 'GPS error';
          console.error('GPS error:', err);
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
      );
    }

    function stopGPS() {
      if (gpsWatcher !== null) {
        navigator.geolocation.clearWatch(gpsWatcher);
        gpsWatcher = null;
      }
      if (gpsMarker) { gpsMarker.remove(); gpsMarker = null; }
      gpsActive = false;
      document.getElementById('btn-gps').classList.remove('active');
      document.getElementById('gps-status').style.display = 'none';
    }

    // ─── Routing ───────────────────────────────────────────────────────────
    let routingMode = false;
    let routeWaypoints = [];
    let routeLayer = null;

    function toggleRoutingPanel() {
      const p = document.getElementById('routing-panel');
      const btn = document.getElementById('btn-route');
      p.classList.toggle('open');
      btn.classList.toggle('active', p.classList.contains('open'));
      closePanel();
    }

    function handleRoutingClick(lngLat) {
      const fromInput = document.getElementById('from-input');
      const toInput = document.getElementById('to-input');
      const val = `${lngLat.lat.toFixed(5)},${lngLat.lng.toFixed(5)}`;
      if (!fromInput.value) {
        fromInput.value = val;
      } else if (!toInput.value) {
        toInput.value = val;
      } else {
        fromInput.value = val;
        toInput.value = '';
      }
    }

    function setRouteDest(lat, lng) {
      document.getElementById('to-input').value = `${lat.toFixed(5)},${lng.toFixed(5)}`;
      document.getElementById('routing-panel').classList.add('open');
      document.getElementById('btn-route').classList.add('active');
      closePanel();
    }

    function parseLatLng(str) {
      const parts = str.split(',').map(Number);
      if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
        return { lat: parts[0], lng: parts[1] };
      }
      return null;
    }

    async function planRoute(mode) {
      const fromStr = document.getElementById('from-input').value.trim();
      const toStr = document.getElementById('to-input').value.trim();

      if (!fromStr || !toStr) {
        document.getElementById('route-result').textContent = 'Enter start and end points.';
        return;
      }

      const from = parseLatLng(fromStr);
      const to = parseLatLng(toStr);
      if (!from || !to) {
        document.getElementById('route-result').textContent = 'Invalid coordinates. Use lat,lng format.';
        return;
      }

      document.getElementById('route-result').textContent = 'Calculating route…';

      // Try OSRM demo server (online) - in a real offline app this hits local Valhalla
      const profile = mode === 'car' ? 'driving' : mode === 'bike' ? 'cycling' : 'foot';
      const url = `https://router.project-osrm.org/route/v1/${profile}/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.code !== 'Ok' || !data.routes?.[0]) {
          throw new Error('No route found');
        }
        const route = data.routes[0];
        const dist = (route.distance / 1000).toFixed(1);
        const mins = Math.round(route.duration / 60);
        const geom = route.geometry;

        // Draw route on map
        drawRoute(geom, mode);

        document.getElementById('route-result').innerHTML =
          `<span style="color:var(--c-accent);font-weight:600">${dist} km</span> · ${mins} min · ${modeLabel(mode)}`;

        map.fitBounds([
          [from.lng, from.lat],
          [to.lng, to.lat]
        ], { padding: 80, duration: 1000 });

      } catch (e) {
        // Offline fallback: show straight line
        const geom = {
          type: 'LineString',
          coordinates: [[from.lng, from.lat], [to.lng, to.lat]]
        };
        drawRoute(geom, mode, true);
        document.getElementById('route-result').innerHTML =
          `<span style="color:var(--c-warn)">⚠ Offline</span> — showing straight line. Local Valhalla needed for real routing.`;
      }
    }

    function modeLabel(m) {
      return { walk: '🚶 Walking', bike: '🚲 Cycling', car: '🚗 Driving' }[m] || m;
    }

    function drawRoute(geom, mode, dashed = false) {
      const colors = { walk: '#4ade80', bike: '#818cf8', car: '#60a5fa' };
      const id = 'route-line';
      if (map.getLayer(id)) map.removeLayer(id);
      if (map.getSource(id)) map.removeSource(id);

      map.addSource(id, { type: 'geojson', data: { type: 'Feature', geometry: geom } });
      map.addLayer({
        id,
        type: 'line',
        source: id,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-color': colors[mode] || '#4ade80',
          'line-width': 4,
          'line-opacity': 0.9,
          ...(dashed ? { 'line-dasharray': [2, 2] } : {})
        }
      });
    }

    // ─── Layer switcher ────────────────────────────────────────────────────
    function toggleLayers() {
      const m = document.getElementById('layers-menu');
      m.classList.toggle('open');
    }

    function setStyle(name) {
      // Only support local styles for offline consistency
      const styles = {
        streets: MAP_STYLE,
        dark: MAP_STYLE_DARK,
        // satellite removed — requires online MapTiler API key
      };
      document.querySelectorAll('.layer-option').forEach(el => el.classList.remove('active'));
      document.getElementById('layer-' + name)?.classList.add('active');
      document.getElementById('layers-menu').classList.remove('open');
      const url = styles[name];
      if (url) map.setStyle(url);
    }

    // ─── Panel helpers ─────────────────────────────────────────────────────
    function showPanel(title, sub, content) {
      document.getElementById('panel-title').textContent = title;
      document.getElementById('panel-sub').textContent = sub;
      document.getElementById('panel-content').innerHTML = content;
      document.getElementById('panel').classList.add('open');
    }
    function closePanel() {
      document.getElementById('panel').classList.remove('open');
    }

    document.getElementById('panel').addEventListener('click', (e) => {
      if (e.target === document.getElementById('panel')) closePanel();
    });

    // ─── Search (using Nominatim — switches to offline fallback msg when down) ──
    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', function () {
      clearTimeout(searchTimeout);
      const q = this.value.trim();
      document.getElementById('search-clear').style.display = q ? 'block' : 'none';
      if (q.length < 3) return;
      searchTimeout = setTimeout(() => searchPlaces(q), 500);
    });

    async function searchPlaces(q) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`,
          { headers: { 'Accept-Language': 'en' } }
        );
        const results = await res.json();
        if (!results.length) {
          showPanel('No results', q, '<p style="color:var(--c-muted);font-size:13px">No places found. Try a different search.</p>');
          return;
        }
        const content = results.map(r => `
      <div class="route-card" onclick="goTo(${r.lat}, ${r.lon}, '${r.display_name.replace(/'/g, "\\'")}')">
        <div class="route-icon" style="background:rgba(74,222,128,0.15)">📍</div>
        <div class="route-info">
          <div class="route-label">${r.display_name.split(',')[0]}</div>
          <div class="route-meta">${r.display_name.split(',').slice(1, 3).join(',').trim()}</div>
        </div>
      </div>
    `).join('');
        showPanel(`Results for "${q}"`, `${results.length} found`, content);
      } catch (e) {
        showPanel('Offline search', q, `
      <p style="color:var(--c-warn);font-size:13px;margin-bottom:12px">⚠ No internet — geocoding unavailable.</p>
      <p style="color:var(--c-muted);font-size:12px">In the full app, a local Photon/MOTIS geocoder handles offline search.</p>
    `);
      }
    }

    function goTo(lat, lon, name) {
      map.flyTo({ center: [lon, lat], zoom: 15, duration: 1000 });
      new maplibregl.Marker({ color: '#4ade80', scale: 0.7 })
        .setLngLat([lon, lat])
        .setPopup(new maplibregl.Popup().setText(name.split(',')[0]))
        .addTo(map)
        .togglePopup();
      closePanel();
      document.getElementById('search-input').value = name.split(',')[0];
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear').style.display = 'none';
      closePanel();
    }

    function copyCoords(lat, lng) {
      navigator.clipboard.writeText(`${lat.toFixed(6)}, ${lng.toFixed(6)}`);
      closePanel();
    }

    // ─── Network status ────────────────────────────────────────────────────
    function updateNetworkStatus() {
      const online = navigator.onLine;
      document.getElementById('net-dot').className = 'status-dot ' + (online ? 'online' : 'offline');
      document.getElementById('net-label').textContent = online ? 'Online' : 'Offline';
      const notice = document.getElementById('offline-notice');
      notice.classList.toggle('show', !online);
    }
    window.addEventListener('online', updateNetworkStatus);
    window.addEventListener('offline', updateNetworkStatus);
    updateNetworkStatus();

    // Close menus on map click
    map.on('click', () => {
      document.getElementById('layers-menu').classList.remove('open');
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        console.log('[Atlas] Service worker registered');
      }).catch(err => console.log('[Atlas] SW error:', err));
    }
  </script>
</body>

</html>
