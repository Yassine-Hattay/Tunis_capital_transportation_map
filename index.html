<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <title>Atlas — Offline Maps</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="./lib/maplibre-gl.css" />
  <script src="./lib/maplibre-gl.js"></script>
  <script src="./lib/pmtiles.js"></script>
  <style>
    :root {
      --c-bg: #0f1117;
      --c-surface: #191c24;
      --c-border: rgba(255, 255, 255, 0.08);
      --c-accent: #4ade80;
      --c-accent2: #818cf8;
      --c-text: #e8eaf0;
      --c-muted: #6b7280;
      --c-warn: #fbbf24;
      --r: 10px;
      --panel-w: 320px;
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    #map {
      flex: 1;
      width: 100%;
      position: relative
    }

    #topbar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      gap: 8px;
      align-items: center
    }

    #search-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r);
      padding: 0 14px;
      height: 44px;
      gap: 10px;
      backdrop-filter: blur(12px);
      transition: border-color .2s
    }

    #search-box:focus-within {
      border-color: var(--c-accent)
    }

    #search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--c-text);
      font-size: 14px;
      font-family: inherit
    }

    #search-input::placeholder {
      color: var(--c-muted)
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--r);
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .15s;
      backdrop-filter: blur(12px);
      flex-shrink: 0
    }

    .icon-btn:hover {
      border-color: var(--c-accent);
      color: var(--c-accent)
    }

    .icon-btn.active {
      background: var(--c-accent);
      color: #0f1117;
      border-color: var(--c-accent)
    }

    #statusbar {
      position: absolute;
      bottom: 20px;
      left: 12px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 24px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--c-muted);
      backdrop-filter: blur(12px)
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--c-muted);
      flex-shrink: 0;
      transition: background .3s
    }

    .status-dot.online {
      background: var(--c-accent);
      box-shadow: 0 0 6px var(--c-accent)
    }

    .status-dot.gps-active {
      background: var(--c-accent2);
      box-shadow: 0 0 6px var(--c-accent2);
      animation: pulse 2s infinite
    }

    .status-dot.offline {
      background: var(--c-warn)
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    #panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--c-surface);
      border-top: 1px solid var(--c-border);
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 32px;
      z-index: 200;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32, .72, 0, 1);
      max-height: 70dvh;
      overflow-y: auto
    }

    #panel.open {
      transform: translateY(0)
    }

    .panel-handle {
      width: 36px;
      height: 4px;
      background: var(--c-border);
      border-radius: 2px;
      margin: 0 auto 20px
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px
    }

    .panel-sub {
      font-size: 13px;
      color: var(--c-muted);
      margin-bottom: 20px
    }

    .route-card {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--r);
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color .15s
    }

    .route-card:hover {
      border-color: var(--c-accent)
    }

    .route-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0
    }

    .route-info {
      flex: 1
    }

    .route-label {
      font-size: 14px;
      font-weight: 500
    }

    .route-meta {
      font-size: 12px;
      color: var(--c-muted)
    }

    #routing-panel {
      position: absolute;
      top: 68px;
      left: 12px;
      width: var(--panel-w);
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r);
      padding: 16px;
      z-index: 100;
      backdrop-filter: blur(12px);
      display: none
    }

    #routing-panel.open {
      display: block
    }

    .route-input {
      width: 100%;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--c-text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      margin-bottom: 8px;
      transition: border-color .2s
    }

    .route-input:focus {
      border-color: var(--c-accent)
    }

    .btn-primary {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s
    }

    .btn-primary:hover {
      opacity: .85
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--c-muted);
      margin-bottom: 8px
    }

    #layers-menu {
      position: absolute;
      top: 68px;
      right: 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r);
      overflow: hidden;
      z-index: 100;
      display: none;
      backdrop-filter: blur(12px);
      min-width: 180px
    }

    #layers-menu.open {
      display: block
    }

    .layer-option {
      padding: 12px 16px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background .1s;
      border-bottom: 1px solid var(--c-border);
      color: var(--c-text)
    }

    .layer-option:last-child {
      border-bottom: none
    }

    .layer-option:hover {
      background: var(--c-bg)
    }

    .layer-option.active {
      color: var(--c-accent)
    }

    #offline-notice {
      position: absolute;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--c-surface);
      border: 1px solid var(--c-warn);
      border-radius: 24px;
      padding: 8px 18px;
      font-size: 12px;
      color: var(--c-warn);
      z-index: 200;
      display: none;
      white-space: nowrap;
      backdrop-filter: blur(12px)
    }

    #offline-notice.show {
      display: flex;
      align-items: center;
      gap: 8px
    }

    #debug-panel {
      position: absolute;
      top: 68px;
      left: 12px;
      right: 12px;
      background: #0a0f1a;
      border: 1px solid var(--c-accent2);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 11px;
      color: #a0c0ff;
      z-index: 300;
      font-family: monospace;
      display: none;
      line-height: 1.8;
      max-height: 200px;
      overflow-y: auto
    }

    #debug-panel.show {
      display: block
    }

    #coords-display {
      position: absolute;
      bottom: 20px;
      right: 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--c-muted);
      z-index: 100;
      backdrop-filter: blur(12px);
      font-family: monospace
    }

    .maplibregl-popup-content {
      background: var(--c-surface) !important;
      border: 1px solid var(--c-border) !important;
      border-radius: 8px !important;
      color: var(--c-text) !important;
      font-family: inherit !important;
      font-size: 13px !important;
      padding: 10px 14px !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .4) !important
    }

    .maplibregl-popup-tip {
      display: none !important
    }

    .maplibregl-ctrl-group {
      background: var(--c-surface) !important;
      border: 1px solid var(--c-border) !important;
      border-radius: var(--r) !important;
      backdrop-filter: blur(12px)
    }

    .maplibregl-ctrl-group button {
      background: none !important;
      border-color: var(--c-border) !important;
      width: 36px !important;
      height: 36px !important
    }

    .maplibregl-ctrl-group button span {
      filter: invert(1) !important
    }

    .maplibregl-ctrl-attrib {
      display: none !important
    }

    .maplibregl-ctrl-bottom-right {
      bottom: 24px;
      right: 12px
    }

    .gps-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--c-accent2);
      border: 3px solid white;
      box-shadow: 0 0 0 4px rgba(129, 140, 248, .3);
      animation: gpsPulse 2s infinite
    }

    @keyframes gpsPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(129, 140, 248, .5)
      }

      70% {
        box-shadow: 0 0 0 12px rgba(129, 140, 248, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(129, 140, 248, 0)
      }
    }

    @media(max-width:480px) {
      :root {
        --panel-w: calc(100vw - 24px)
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="topbar">
    <div id="search-box">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" opacity="0.5">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input id="search-input" type="text" placeholder="Search Tunisia…" autocomplete="off" />
      <span id="search-clear" style="cursor:pointer;opacity:0.5;display:none" onclick="clearSearch()">✕</span>
    </div>
    <button class="icon-btn" id="btn-gps" onclick="toggleGPS()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3" />
        <path d="M12 2v3m0 14v3M2 12h3m14 0h3" />
      </svg>
    </button>
    <button class="icon-btn" id="btn-route" onclick="toggleRoutingPanel()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 17l4-10 4 6 4-4 6 4" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
    <button class="icon-btn" id="btn-layers" onclick="toggleLayers()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12 2 22 8.5 12 15 2 8.5" />
        <polyline points="2 15.5 12 22 22 15.5" />
        <polyline points="2 12 12 18.5 22 12" />
      </svg>
    </button>
  </div>

  <div id="offline-notice"><span>⚠</span> Offline — using cached map</div>
  <div id="debug-panel"></div>

  <div id="routing-panel">
    <p class="section-label">Plan a route</p>
    <input class="route-input" id="from-input" placeholder="From — click map or type lat,lng" />
    <input class="route-input" id="to-input" placeholder="To — click map or type lat,lng" />
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="btn-primary" style="background:var(--c-accent);color:#0f1117" onclick="planRoute('walk')">🚶
        Walk</button>
      <button class="btn-primary" style="background:var(--c-accent2);color:#fff" onclick="planRoute('bike')">🚲
        Bike</button>
      <button class="btn-primary" style="background:#374151;color:#e8eaf0" onclick="planRoute('car')">🚗 Drive</button>
    </div>
    <div id="route-result" style="font-size:13px;color:var(--c-muted);min-height:20px"></div>
  </div>

  <div id="layers-menu">
    <div class="layer-option active" id="layer-dark" onclick="setTheme('dark')"><span>🌑</span> Dark</div>
    <div class="layer-option" id="layer-light" onclick="setTheme('light')"><span>🗺️</span> Light</div>
  </div>

  <div id="statusbar">
    <div class="status-pill">
      <div class="status-dot" id="net-dot"></div>
      <span id="net-label">Checking…</span>
    </div>
    <div class="status-pill" id="gps-status" style="display:none">
      <div class="status-dot gps-active"></div>
      <span id="gps-label">GPS active</span>
    </div>
    <div class="status-pill">
      <div class="status-dot" style="background:var(--c-accent2)"></div>
      <span id="tile-label">Tunisia offline map</span>
    </div>
  </div>

  <div id="coords-display">—</div>

  <div id="panel">
    <div class="panel-handle"></div>
    <div class="panel-title" id="panel-title">Location</div>
    <div class="panel-sub" id="panel-sub"></div>
    <div id="panel-content"></div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    //  ROOT CAUSE OF THE BLACK MAP (now fixed):
    //
    //  The PMTiles() constructor needs a real HTTP URL like:
    //    http://localhost:3000/data/tunis.pmtiles
    //
    //  Passing a bare path like '/data/tunis.pmtiles' causes the library's
    //  internal fetch worker to resolve it against the wrong base and produce
    //  "pmtiles:///data/tunis.pmtiles" — which fails with "URL scheme not
    //  supported" because pmtiles:// is only valid for MapLibre sources,
    //  not for JS fetch() calls.
    //
    //  Fix: always build the full URL at runtime using window.location.
    // ─────────────────────────────────────────────────────────────────────────

    // ── 1. Build the absolute HTTP URL for the PMTiles file ──────────────────
    //    This works regardless of what port `serve` uses.
    const PMTILES_HTTP_URL = new URL('./data/tunis.pmtiles', window.location.href).href;
    const PMTILES_STYLE_URL = 'pmtiles://' + PMTILES_HTTP_URL;

    dbg('PMTiles HTTP URL: ' + PMTILES_HTTP_URL);
    dbg('PMTiles style URL: ' + PMTILES_STYLE_URL);

    // ✅ ADD THIS LINE
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    // ✅ register the file correctly
    const pmtilesFile = new pmtiles.PMTiles(PMTILES_HTTP_URL);
    protocol.add(pmtilesFile);

    // ── 3. Build full OpenMapTiles v3.11 style ────────────────────────────────
    //    Layer names confirmed from: pmtiles show data/tunis.pmtiles
    //    Schema: OpenMapTiles v3.11, id: openmaptiles
    //    Bounds: 9.978–10.493 lng, 36.659–37.008 lat (Tunis metro area)
    function buildStyle(theme) {
      const isDark = theme === 'dark';

      // Theme color tokens
      const c = isDark ? {
        bg: '#0d1017', water: '#111e32', waterline: '#172840',
        park: '#0c1a10', res: '#111318',
        bld: '#171b27', bld2: '#1e2235',
        rmin: '#1e2335', rmaj: '#252c42', rhwy: '#38405e', rhwy2: '#1c2338',
        rail: '#1a2030',
        rlabel: '#6a7a9a', plabel: '#b8c8e0', wlabel: '#304e78', poi: '#5a6a88',
        border: '#281830', peak: '#8b949e', peakLabel: '#9ca3af',
        houseNum: '#6b7280',
      } : {
        bg: '#f5f2ed', water: '#a8d0e0', waterline: '#70b0d0',
        park: '#d0e8c0', res: '#ece8df',
        bld: '#ddd8cf', bld2: '#ccc8be',
        rmin: '#ffffff', rmaj: '#f8f2e8', rhwy: '#f8cc80', rhwy2: '#cc8830',
        rail: '#aaaaaa',
        rlabel: '#505070', plabel: '#202030', wlabel: '#3a5880', poi: '#405060',
        border: '#cc88aa', peak: '#6b7280', peakLabel: '#374151',
        houseNum: '#6b7280',
      };

      return {
        version: 8,
        name: "Bright (Offline) — Full Layer Set",
        glyphs: './font/{fontstack}/{range}.pbf',
        sprite: "./sprites/sprite",
        spritePixelRatio: 1,
        sources: {
          omt: {
            type: "vector",
            url: PMTILES_STYLE_URL
          }
        },
        layers: [
          // ── BACKGROUND ─────────────────────────────────────────────────────
          { id: "background", type: "background", paint: { "background-color": c.bg } },

          // ── LANDCOVER ──────────────────────────────────────────────────────
          {
            id: "landcover-glacier", type: "fill", source: "omt", "source-layer": "landcover",
            filter: ["==", "subclass", "glacier"],
            layout: { visibility: "visible" },
            paint: { "fill-color": "#fff", "fill-opacity": { base: 1, stops: [[0, 0.9], [10, 0.3]] } }
          },
          {
            id: "landcover-wood", type: "fill", source: "omt", "source-layer": "landcover",
            filter: ["==", "class", "wood"],
            paint: {
              "fill-antialias": { base: 1, stops: [[0, false], [9, true]] },
              "fill-color": "#6a4", "fill-opacity": 0.1, "fill-outline-color": "hsla(0,0%,0%,0.03)"
            }
          },
          {
            id: "landcover-grass", type: "fill", source: "omt", "source-layer": "landcover",
            filter: ["==", "class", "grass"],
            paint: { "fill-color": "#d8e8c8", "fill-opacity": 1 }
          },
          {
            id: "landcover-ice-shelf", type: "fill", source: "omt", "source-layer": "landcover",
            filter: ["==", "subclass", "ice_shelf"],
            layout: { visibility: "visible" },
            paint: { "fill-color": "#fff", "fill-opacity": { base: 1, stops: [[0, 0.9], [10, 0.3]] } }
          },
          {
            id: "landcover-sand", type: "fill", source: "omt", "source-layer": "landcover",
            filter: ["==", "class", "sand"],
            layout: { visibility: "visible" },
            paint: { "fill-color": "rgba(245,238,188,1)", "fill-opacity": 1 }
          },

          // ── LANDUSE ─────────────────────────────────────────────────────────
          {
            id: "landuse-residential", type: "fill", source: "omt", "source-layer": "landuse",
            filter: ["all", ["in", "class", "residential", "suburb", "neighbourhood"]],
            layout: { visibility: "visible" },
            paint: {
              "fill-color": { base: 1, stops: [[12, "hsla(30,19%,90%,0.4)"], [16, "hsla(30,19%,90%,0.2)"]] }
            }
          },
          {
            id: "landuse-commercial", type: "fill", source: "omt", "source-layer": "landuse",
            filter: ["all", ["==", "$type", "Polygon"], ["==", "class", "commercial"]],
            layout: { visibility: "visible" },
            paint: { "fill-color": "hsla(0,60%,87%,0.23)" }
          },
          {
            id: "landuse-industrial", type: "fill", source: "omt", "source-layer": "landuse",
            filter: ["all", ["==", "$type", "Polygon"], ["in", "class", "industrial", "garages", "dam"]],
            layout: { visibility: "visible" },
            paint: { "fill-color": "hsla(49,100%,88%,0.34)" }
          },
          {
            id: "landuse-cemetery", type: "fill", source: "omt", "source-layer": "landuse",
            filter: ["==", "class", "cemetery"],
            paint: { "fill-color": "#e0e4dd" }
          },
          {
            id: "landuse-hospital", type: "fill", source: "omt", "source-layer": "landuse",
            filter: ["==", "class", "hospital"],
            paint: { "fill-color": "#fde" }
          },
          {
            id: "landuse-school", type: "fill", source: "omt", "source-layer": "landuse",
            filter: ["==", "class", "school"],
            paint: { "fill-color": "#f0e8f8" }
          },
          {
            id: "landuse-railway", type: "fill", source: "omt", "source-layer": "landuse",
            filter: ["==", "class", "railway"],
            layout: { visibility: "visible" },
            paint: { "fill-color": "hsla(30,19%,90%,0.4)" }
          },

          // ── PARK ────────────────────────────────────────────────────────────
          {
            id: "park", type: "fill", source: "omt", "source-layer": "park",
            filter: ["==", "class", "public_park"],
            paint: { "fill-color": c.park, "fill-opacity": 0.8 }
          },

          // ── WATER ───────────────────────────────────────────────────────────
          {
            id: "water-offset", type: "fill", source: "omt", "source-layer": "water",
            maxzoom: 8, filter: ["==", "$type", "Polygon"],
            layout: { visibility: "visible" },
            paint: {
              "fill-color": "#a0c8f0", "fill-opacity": 1,
              "fill-translate": { base: 1, stops: [[6, [2, 0]], [8, [0, 0]]] }
            }
          },
          {
            id: "water", type: "fill", source: "omt", "source-layer": "water",
            filter: ["all", ["!=", "intermittent", 1], ["!=", "brunnel", "tunnel"]],
            layout: { visibility: "visible" },
            paint: { "fill-color": isDark ? c.water : "hsl(210,67%,85%)" }
          },

    // ── 4. Create the map ─────────────────────────────────────────────────────
    const map = new maplibregl.Map({
      container: 'map',
      style: buildStyle('dark'),
      center: [10.1815, 36.8065],  // Tunis
      zoom: 12,
      attributionControl: false,
      // Lock to the tile bounds from pmtiles show output
      maxBounds: [[9.5, 36.3], [11.0, 37.4]]
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'bottom-right');
    map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

    // ── 5. On load: verify tiles are coming in ────────────────────────────────
    map.on('load', async () => {
      map.getStyle().layers.forEach(l => {
        console.log("LAYER:", l.id, "SOURCE:", l["source-layer"]);
      });
      debugRoads();

      dbg('Map loaded. Verifying tile connection…');
      try {
        // Try a direct byte-range request to confirm the file is accessible
        const r = await fetch(PMTILES_HTTP_URL, {
          headers: { Range: 'bytes=0-127' }
        });
        if (r.ok || r.status === 206) {
          dbg('✓ PMTiles file reachable (' + r.status + ')');
          // Read metadata to confirm layer names
          const header = await pmtilesFile.getHeader();
          const metadata = await pmtilesFile.getMetadata();
          const layers = (metadata?.vector_layers || []).map(l => l.id);
          dbg('Spec v' + header.specVersion + ' · bounds: ' +
            header.minLon.toFixed(2) + '→' + header.maxLon.toFixed(2));
          dbg('Layers: ' + (layers.length ? layers.join(', ') : '(empty — check metadata)'));
          console.log("VECTOR LAYERS RAW:", metadata.vector_layers);
          document.getElementById('tile-label').textContent =
            'Tunis offline (' + layers.length + ' layers)';
          if (layers.length && !layers.includes('transportation')) {
            dbg('⚠ No "transportation" layer found. Actual layers listed above.');
            dbg('Update source-layer names in buildStyle() to match.');
          }
        } else {
          dbg('✗ File fetch failed: HTTP ' + r.status);
          dbg('Make sure data/tunis.pmtiles exists at: ' + PMTILES_HTTP_URL);
        }
      } catch (e) {
        dbg('✗ Cannot reach file: ' + e.message);
        dbg('Is the file at data/tunis.pmtiles relative to index.html?');
      }
    });
    map.on('zoom', () => {
      console.log("ZOOM:", map.getZoom());
    });
    map.on('error', e => {
      const msg = e.error?.message || '';
      if (msg.includes('canceled') || msg.includes('abort')) return;
      dbg('Map error: ' + msg);
    });

    function dbg(msg) {

    // ── GPS ────────────────────────────────────────────────────────────────────
    let gpsWatcher = null, gpsMarker = null, gpsActive = false;
    function toggleGPS() { gpsActive ? stopGPS() : startGPS(); }
    function startGPS() {
      if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
      document.getElementById('btn-gps').classList.add('active');
      document.getElementById('gps-status').style.display = 'flex';
      gpsActive = true;
      gpsWatcher = navigator.geolocation.watchPosition(
        ({ coords: { latitude: lat, longitude: lng, accuracy } }) => {
          document.getElementById('gps-label').textContent = `±${Math.round(accuracy)}m`;
          if (!gpsMarker) {
            const el = document.createElement('div'); el.className = 'gps-marker';
            gpsMarker = new maplibregl.Marker({ element: el }).setLngLat([lng, lat]).addTo(map);
            map.flyTo({ center: [lng, lat], zoom: 15, duration: 1200 });
          } else gpsMarker.setLngLat([lng, lat]);
        },
        () => { document.getElementById('gps-label').textContent = 'GPS error'; },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
      );
    }
    function stopGPS() {
      if (gpsWatcher !== null) navigator.geolocation.clearWatch(gpsWatcher);
      if (gpsMarker) { gpsMarker.remove(); gpsMarker = null; }
      gpsActive = false;
      document.getElementById('btn-gps').classList.remove('active');
      document.getElementById('gps-status').style.display = 'none';
    }

    function toggleRoutingPanel() {
      const p = document.getElementById('routing-panel');

    function handleRoutingClick({ lat, lng }) {
      const from = document.getElementById('from-input');
      const to = document.getElementById('to-input');
      const v = `${lat.toFixed(5)},${lng.toFixed(5)}`;
      if (!from.value) from.value = v;
      else if (!to.value) to.value = v;
      else { from.value = v; to.value = ''; }
    }
    function setRouteDest(lat, lng) {
      document.getElementById('to-input').value = `${lat.toFixed(5)},${lng.toFixed(5)}`;
      document.getElementById('routing-panel').classList.add('open');
      document.getElementById('btn-route').classList.add('active');
      routingClickActive = true; closePanel();
    }
    function parseLatLng(s) {
      const p = s.split(',').map(Number);
      return p.length === 2 && !isNaN(p[0]) && !isNaN(p[1]) ? { lat: p[0], lng: p[1] } : null;
    }
    // Decode Valhalla's 6-digit precision polyline
    function decodeValhallaPolyline(encoded) {
      const coords = [];
      let index = 0, lat = 0, lng = 0;

      while (index < encoded.length) {
        let b, shift = 0, result = 0;
        do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        const dlat = ((result & 1) ? ~(result >> 1) : (result >> 1)); lat += dlat;

        shift = 0; result = 0;
        do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        const dlng = ((result & 1) ? ~(result >> 1) : (result >> 1)); lng += dlng;

        coords.push([lng / 1e6, lat / 1e6]);
      }
      return coords;
    }
    async function planRoute(mode) {
      const from = parseLatLng(document.getElementById('from-input').value.trim());
      const to = parseLatLng(document.getElementById('to-input').value.trim());
      if (!from || !to) {
        document.getElementById('route-result').textContent = 'Enter valid coordinates.';
        return;
      }
      document.getElementById('route-result').textContent = 'Calculating…';

      // Valhalla costing mapping
      const costing = { car: 'auto', bike: 'bicycle', walk: 'pedestrian' }[mode];

      // Valhalla POST payload
      const body = {
        locations: [
          { lat: from.lat, lon: from.lng },
          { lat: to.lat, lon: to.lng }
        ],
        costing: costing,
        directions_options: { units: 'kilometers' }
      };

      try {
        const res = await fetch('http://192.168.1.106/route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const d = await res.json();

        if (!d.trip?.legs?.[0]?.shape) throw new Error('No route geometry');

        // Decode Valhalla's encoded polyline
        const coordinates = decodeValhallaPolyline(d.trip.legs[0].shape);
        drawRoute({ type: 'LineString', coordinates }, mode);

        const distance = d.trip.summary.length; // km
        const duration = d.trip.summary.time; // seconds
        document.getElementById('route-result').innerHTML =
          `<span style="color:var(--c-accent);font-weight:600">${distance.toFixed(1)} km</span> · ${Math.round(duration / 60)} min`;

        map.fitBounds([[from.lng, from.lat], [to.lng, to.lat]], { padding: 80, duration: 1000 });

      } catch (e) {
        console.error('Routing error:', e);
        drawRoute({ type: 'LineString', coordinates: [[from.lng, from.lat], [to.lng, to.lat]] }, mode, true);
        document.getElementById('route-result').innerHTML =
          `<span style="color:var(--c-warn)">⚠ Routing failed</span> — straight line shown`;
      }
    }



    function drawRoute(geom, mode, dashed = false) {
      const colors = { walk: '#4ade80', bike: '#818cf8', car: '#60a5fa' };
      const id = 'route-line';
      if (map.getLayer(id)) map.removeLayer(id);
      if (map.getSource(id)) map.removeSource(id);
      map.addSource(id, { type: 'geojson', data: { type: 'Feature', geometry: geom } });
      map.addLayer({
        id, type: 'line', source: id,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-color': colors[mode] || '#4ade80', 'line-width': 4, 'line-opacity': .9,
          ...(dashed ? { 'line-dasharray': [2, 2] } : {})
        }
      });
    }
    // Decode Valhalla's polyline6 encoded shape to GeoJSON LineString coordinates
    function decodePolyline6(encoded) {
      if (!encoded) return { type: 'LineString', coordinates: [] };

      let index = 0, lat = 0, lng = 0;
      const coordinates = [];
      const factor = 1e6; // polyline6 uses 1e6 precision

      while (index < encoded.length) {
        // Decode latitude
        let b, shift = 0, result = 0;
        do {
          b = encoded.charCodeAt(index++) - 63;
          result |= (b & 0x1f) << shift;
          shift += 5;
        } while (b >= 0x20);
        const dlat = (result & 1) ? ~(result >> 1) : (result >> 1);
        lat += dlat;

        // Decode longitude
        shift = 0; result = 0;
        do {
          b = encoded.charCodeAt(index++) - 63;
          result |= (b & 0x1f) << shift;
          shift += 5;
        } while (b >= 0x20);
        const dlng = (result & 1) ? ~(result >> 1) : (result >> 1);
        lng += dlng;

        coordinates.push([lng / factor, lat / factor]);
      }

      return { type: 'LineString', coordinates };
    }
    // ── Search ─────────────────────────────────────────────────────────────────
    let st;
    document.getElementById('search-input').addEventListener('input', function () {
      clearTimeout(st);
      const q = this.value.trim();
      document.getElementById('search-clear').style.display = q ? 'block' : 'none';
      if (q.length < 3) return;
      st = setTimeout(() => searchPlaces(q), 500);
    });
    async function searchPlaces(q) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&countrycodes=tn`,
          { headers: { 'Accept-Language': 'en' } });
        const results = await res.json();
        if (!results.length) { showPanel(`"${q}"`, 'No results', '<p style="color:var(--c-muted);font-size:13px">Nothing found.</p>'); return; }
        showPanel(`"${q}"`, `${results.length} results`,
          results.map(r =>
            `<div class="route-card" onclick="goTo(${r.lat},${r.lon},'${r.display_name.replace(/'/g, "\\'")}')">
           <div class="route-icon" style="background:rgba(74,222,128,.15)">📍</div>
           <div class="route-info">
             <div class="route-label">${r.display_name.split(',')[0]}</div>
             <div class="route-meta">${r.display_name.split(',').slice(1, 3).join(',').trim()}</div>
           </div></div>`).join(''));
      } catch {
        showPanel('Search', 'Offline',
          `<p style="color:var(--c-warn);font-size:13px">⚠ No internet — geocoding unavailable.</p>`);
      }
    }
    function goTo(lat, lon, name) {
      map.flyTo({ center: [lon, lat], zoom: 15, duration: 1000 });
      new maplibregl.Marker({ color: '#4ade80', scale: .7 })
        .setLngLat([lon, lat]).setPopup(new maplibregl.Popup().setText(name.split(',')[0]))
        .addTo(map).togglePopup();
      closePanel();
      document.getElementById('search-input').value = name.split(',')[0];
    }
    function clearSearch() {
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear').style.display = 'none';
      closePanel();
    }
    function copyCoords(lat, lng) {
      navigator.clipboard?.writeText(`${lat.toFixed(6)}, ${lng.toFixed(6)}`);
      closePanel();
    }

    // ── Panel ──────────────────────────────────────────────────────────────────
    function showPanel(title, sub, content) {
      document.getElementById('panel-title').textContent = title;
      document.getElementById('panel-sub').textContent = sub;
      document.getElementById('panel-content').innerHTML = content;
      document.getElementById('panel').classList.add('open');
    }
    function closePanel() { document.getElementById('panel').classList.remove('open'); }

    // ── Network status ─────────────────────────────────────────────────────────
    function updateNetworkStatus() {
      const online = navigator.onLine;
      document.getElementById('net-dot').className = 'status-dot ' + (online ? 'online' : 'offline');
      document.getElementById('net-label').textContent = online ? 'Online' : 'Offline';
      document.getElementById('offline-notice').classList.toggle('show', !online);
    }
    window.addEventListener('online', updateNetworkStatus);
    window.addEventListener('offline', updateNetworkStatus);
    updateNetworkStatus();

    // ── Service Worker ─────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('[Atlas] SW registered'))
        .catch(e => console.warn('[Atlas] SW error:', e));
    }

    function debugRoads() {
      const features = map.querySourceFeatures('omt', {
        sourceLayer: 'transportation'
      });

      console.log("TOTAL ROAD FEATURES:", features.length);
      console.log("SAMPLE:", features.slice(0, 10));
    }

    map.on('zoom', countVisibleRoads);

    function countVisibleRoads() {
      try {
        // OpenFreeMap Liberty uses 'highway-*' layer names, not 'road-*'
        const features = map.queryRenderedFeatures({
          layers: ['highway-primary', 'highway-secondary', 'highway-motorway']
        });
        console.log("VISIBLE ROADS:", features.length);
      } catch (e) {
        // Silently ignore if layers don't exist
      }
    }
  </script>
